DOMAIN-SUFFIX,wb.ru,DIRECT
DOMAIN-KEYWORD,wildberries,DIRECT
DOMAIN-KEYWORD,wbbasket,DIRECT
DOMAIN-KEYWORD,wbstatic,DIRECT
